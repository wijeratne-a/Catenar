# Aegis Enterprise values - Redis, Datadog, Splunk, SIEM integrations.
# Deploy alongside the base aegis chart. For KMS/Vault signing, use Aegis Enterprise verifier image.

integrations:
  datadog:
    enabled: false
    apiKey: ""
    site: datadoghq.com
  splunk:
    enabled: false
    hecEndpoint: ""
    hecToken: ""
  webhook:
    enabled: false
    url: ""
    secretName: ""

redis:
  enabled: false
  url: ""
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

otelCollector:
  env:
    siemOtlpHttpEndpoint: ""
    siemOtlpHttpToken: ""
    splunkHecEndpoint: ""
    splunkHecToken: ""
    lokiEndpoint: ""
