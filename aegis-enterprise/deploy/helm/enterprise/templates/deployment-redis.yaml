{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aegis-redis
  template:
    metadata:
      labels:
        app: aegis-redis
    spec:
      securityContext:
        {{- toYaml .Values.redis.podSecurityContext | nindent 8 }}
      containers:
        - name: redis
          image: redis:7-alpine
          securityContext:
            {{- toYaml .Values.redis.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-redis
spec:
  selector:
    app: aegis-redis
  ports:
    - port: 6379
      targetPort: 6379
{{- end }}
