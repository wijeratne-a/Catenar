services:
  verifier:
    build:
      context: ./core/verifier
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      KEY_PROVIDER: local
      CATENAR_DEV_ALLOW_EPHEMERAL_KEY: "1"
      WEBHOOK_URL: http://web:3000/api/alerts/ingest
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-demo-webhook-secret-min-32-characters-long}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  proxy:
    build:
      context: ./core/proxy
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ENFORCE_MODE: strict
      VERIFIER_URL: http://verifier:3000
      SEMANTIC_DENY: "true"
      METRICS_ENABLED: "true"
      CATENAR_DEMO_EVIL_PORT: "19999"
      CATENAR_STRESS_MOCK_PORT: "9999"
      POLICY_MANAGEMENT_FROM_DASHBOARD: "1"
      CATENAR_CA_PATH: /app/ca/ca.crt
    volumes:
      - ./deploy/certs:/app/ca
      - ./policies:/app/policies
      - ./policy.json:/app/policy.json
      - ./data:/app/data
    depends_on:
      verifier:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_VERIFIER_URL: http://localhost:3000
      NEXT_PUBLIC_PROXY_URL: http://localhost:8080
      NEXT_PUBLIC_API_URL: http://localhost:3000
      CATENAR_PROXY_URL: http://proxy:8080
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-demo-webhook-secret-min-32-characters-long}
    depends_on:
      - verifier

  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus-demo.yaml:/etc/prometheus/prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - proxy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    volumes:
      - ./deploy/otel-collector-config.yaml:/etc/otelcol/config.yaml
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"

  grafana:
    image: grafana/grafana:10.2.0
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme-admin-demo-only}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
