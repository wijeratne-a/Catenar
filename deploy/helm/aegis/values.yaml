proxy:
  image: aegis-proxy:latest
  replicas: 2
  enforceMode: audit_only
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

verifier:
  image: aegis-verifier:latest
  replicas: 2
  port: 3000
  keyProvider: local
  aegisCloudUrl: ""
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

otel:
  enabled: true
  endpoint: http://otel-collector:4317

policy:
  engine: rego
  directory: /etc/aegis/policies
  defaultRego: |
    package aegis
    default allow = false
    default reason = "policy denied request"
    allow {
      input.agent_metadata.domain == "defi"
      not blocked
    }
    reason = "restricted endpoint access"
    blocked {
      endpoint := input.public_values.restricted_endpoints[_]
      contains(input.execution_trace[_].target, endpoint)
    }

identity:
  required: false
