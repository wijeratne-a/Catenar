proxy:
  image: aegis-proxy:latest
  replicas: 2
  enforceMode: strict
  port: 8080
  traceWalPath: /var/lib/aegis/proxy-trace.jsonl
  wal:
    persistentVolume:
      enabled: false
      claimName: ""
  # BYO Root CA: provide a K8s TLS secret with tls.crt and tls.key.
  # When set, the proxy loads this CA instead of generating an ephemeral one.
  externalCa:
    secretName: ""
  podSecurityContext:
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  fluentBit:
    enabled: true
    image: fluent/fluent-bit:3.0
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 128Mi
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 10001
      runAsGroup: 10001
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
    output:
      host: otel-collector
      port: 24224
      tls: false
      sharedKey: ""

verifier:
  image: aegis-verifier:latest
  replicas: 2
  port: 3000
  tls:
    enabled: false
    secretName: ""
    clientCertSecretName: ""
  keyProvider: env
  aegisCloudUrl: ""
  signingKeySecretName: aegis-signing-key
  serviceAccount:
    create: true
    name: aegis-verifier
    annotations: {}
    automountServiceAccountToken: false
  podSecurityContext:
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

otel:
  enabled: true
  endpoint: http://otel-collector:4317

otelCollector:
  configMap:
    create: true
    name: otel-collector-config
  env:
    siemOtlpHttpEndpoint: ""
    siemOtlpHttpToken: ""
    splunkHecEndpoint: ""
    splunkHecToken: ""
    lokiEndpoint: ""
  config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      fluentforward:
        endpoint: 0.0.0.0:24224

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
      batch:
        timeout: 5s

    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
      debug:
        verbosity: basic
      otlphttp/siem:
        endpoint: ${env:SIEM_OTLP_HTTP_ENDPOINT}
        headers:
          Authorization: Bearer ${env:SIEM_OTLP_HTTP_TOKEN}
      splunk_hec:
        endpoint: ${env:SPLUNK_HEC_ENDPOINT}
        token: ${env:SPLUNK_HEC_TOKEN}
      loki:
        endpoint: ${env:LOKI_ENDPOINT}

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug, otlphttp/siem]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheus, otlphttp/siem]
        logs:
          receivers: [otlp, fluentforward]
          processors: [memory_limiter, batch]
          exporters: [debug, otlphttp/siem, splunk_hec, loki]

policy:
  engine: rego
  directory: /etc/aegis/policies
  defaultRego: |
    package aegis
    default allow = false
    default reason = "policy denied request"
    allow {
      input.agent_metadata.domain == "defi"
      not blocked
    }
    reason = "restricted endpoint access"
    blocked {
      endpoint := input.public_values.restricted_endpoints[_]
      contains(input.execution_trace[_].target, endpoint)
    }

identity:
  required: true

networkPolicy:
  enabled: true
  proxyIngress:
    enabled: true
    namespaceSelector: {}
    podSelector: {}
  egress:
    dns:
      enabled: true
    cloudCidrs:
      - 0.0.0.0/0

secrets:
  signingKey:
    create: false
    name: aegis-signing-key
    value: ""

# Integrations: SIEM, Datadog, Splunk, etc.
integrations:
  datadog:
    enabled: false
    apiKey: ""
    site: datadoghq.com
  splunk:
    enabled: false
    hecEndpoint: ""
    hecToken: ""
  webhook:
    enabled: false
    url: ""
    secretName: ""

redis:
  enabled: false
  url: ""
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
