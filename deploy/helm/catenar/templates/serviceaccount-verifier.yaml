{{- if .Values.verifier.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.verifier.serviceAccount.name | default "catenar-verifier" }}
  {{- with .Values.verifier.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.verifier.serviceAccount.automountServiceAccountToken }}
{{- end }}
