{{- if .Values.secrets.signingKey.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.signingKey.name | quote }}
type: Opaque
stringData:
  CATENAR_SIGNING_KEY_HEX: {{ required "secrets.signingKey.value must be set when secrets.signingKey.create=true" .Values.secrets.signingKey.value | quote }}
{{- end }}
